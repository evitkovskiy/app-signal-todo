<div class="todos">
  <header class="todos__header">
    <todos-search class="todos__search"></todos-search>

    <button class="todos__add-btn" (click)="dialog.open()">Добавить</button>
  </header>

  <todos-dialog #dialog></todos-dialog>

  @defer {
    <section class="todos__list" aria-label="Список задач">
      <ul class="todos__items">
        @for (todo of store.filteredTodos(); track todo.id) {
          <li class="todos__item">
            <todos-item [todo]="todo"></todos-item>
          </li>
        }
      </ul>
    </section>
  } @placeholder {
    <div class="todos__placeholder">Move to bottom for loading</div>
  } @loading {
    <div class="todos__loading">Loading...</div>
  } @error {
    <div class="todos__error">Something error</div>
  }
</div>
