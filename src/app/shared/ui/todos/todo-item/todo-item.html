<article class="todo-item">
  <details class="todo-item__details" [open]="todo().complete">
    <summary class="todo-item__summary">
      <label class="todo-item__checkbox">
        <input
          type="checkbox"
          [checked]="todo().complete"
          (change)="toggleCompleted()"
        />
        <span></span>
      </label>

      <span
        class="todo-item__title"
        [class.todo-item__title--completed]="todo().complete"
      >
        {{ todo().title }}
      </span>
    </summary>

    <p class="todo-item__description">
      {{ todo().description }}
    </p>

    <menu class="todo-item__actions">
      <button
        class="todo-item__remove-btn"
        type="button"
        (click)="remove()"
      >
        Удалить
      </button>
    </menu>
  </details>
</article>
